# Weekly dependency and Actions updates. Grouped so Chaindump gets one PR per
# ecosystem instead of a storm — each still runs the full CI gate before merge.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
    groups:
      root-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: "/agent-desk"
    schedule: { interval: weekly }
    open-pull-requests-limit: 3
    groups:
      agent-desk-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: "/mcp-server"
    schedule: { interval: weekly }
    open-pull-requests-limit: 3
    groups:
      mcp-server-deps:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
    groups:
      actions:
        patterns: ["*"]
