name: CI

# The quality gate for every change. Runs on all PRs and on pushes to main.
# Branch protection requires the `ci-success` aggregate job below, so a red run
# cannot merge. Complements the SonarCloud + CodeRabbit GitHub Apps, which review
# but do not execute the code (CLAUDE.md §1.1 TDD, §1.2 review).
on:
  pull_request:
  push:
    branches: [main]

# Least privilege by default. `npm ci` runs dependency lifecycle scripts, so the
# token stays read-only. Jobs that need more request it explicitly.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm test

  agent-desk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-desk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: agent-desk/package-lock.json }
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  mcp-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: mcp-server/package-lock.json }
      - run: npm ci
      - run: npm run typecheck

  guards:
    # Cheap correctness gates: the Worker parses, and new migrations obey the D1
    # rules (sequential numbering, no explicit transactions).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: node --input-type=module --check < src/worker.js
      - run: node scripts/check-migrations.mjs

  audit:
    # Fails only on a known high/critical advisory in production deps. Advisory-only,
    # so a transient devDep issue does not block a merge.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high

  ci-success:
    # Single required status check for branch protection. Green only if every
    # upstream job succeeded — so adding a job here automatically gates merges.
    needs: [lint, test, agent-desk, mcp-server, guards, audit]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
