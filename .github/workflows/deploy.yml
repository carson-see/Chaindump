name: Deploy

# Continuous delivery for the chaindump Worker. Merging to main is the ONLY path
# to production — this replaces the old "whoever runs `wrangler deploy` last wins"
# footgun, where prod could silently run an unmerged branch (CLAUDE.md §3.2).
#
# Flow: push to main -> re-run the test suite -> WAIT for a human to approve the
# `production` environment -> apply D1 migrations -> wrangler deploy.
# The human gate lives in the GitHub `production` environment (required reviewer),
# which additionally only permits deploys from protected branches.
#
# Requires one repo secret: CLOUDFLARE_API_TOKEN (Workers + D1 edit). Use the GCP
# secret `Chaindump_Cloudflare` — the older cloudflare-api-token lacks D1 and fails.
#
# Node 22: wrangler's package engines require >=22, so the deploy runtime must be
# 22 or `npx wrangler` fails after the approval gate. Actions pinned to SHAs.
on:
  push:
    branches: [main]
  workflow_dispatch: # manual redeploy of main from the Actions tab

permissions:
  contents: read

concurrency:
  # Never let two deploys race; a newer main supersedes an in-flight one.
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    # Gate: prod only deploys code whose tests pass on main. Also a belt-and-braces
    # guard so a manual (workflow_dispatch) run can never target a non-main ref.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm test
      - run: node scripts/check-migrations.mjs

  deploy:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # The required-reviewer gate. GitHub pauses here until a reviewer approves.
    environment:
      name: production
      url: https://chaindump.xyz
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with: { node-version: 22, cache: npm }
      - run: npm ci
      # Apply any new D1 migrations BEFORE the Worker that depends on them ships.
      # Idempotent: already-applied migrations are skipped.
      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply chaindump-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Post-deploy smoke check
        # Give the edge a moment to propagate (~5-15s per CLAUDE.md §3.2), then
        # confirm the live site answers 200 before calling the deploy good.
        run: |
          sleep 20
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w '%{http_code}' https://chaindump.xyz/api/health || echo 000)
            echo "attempt $i: /api/health -> $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 10
          done
          echo "Smoke check did not see a 200 from /api/health (may be propagation lag; verify manually)."
          exit 1
